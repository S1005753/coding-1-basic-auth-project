{% extends "base.html" %}

{% block content %}
<h1>Register</h1>
<form method="POST">
  <input name="username" placeholder="Username"><br>
  <input name="password" type="password" placeholder="Password"><br>
  <button type="submit">Sign Up</button>
</form>
<a href="/" class="login-link">Back to Login</a>
<p class="error">{{ error }}</p>
{% endblock %}
